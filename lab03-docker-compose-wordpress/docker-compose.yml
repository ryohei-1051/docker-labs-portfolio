services:
  wordpress:
    image: wordpress:latest
    container_name: ryohei_wordpress
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "5524:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ryohei_wordpress
      WORDPRESS_DB_USER: ryohei_wpuser
      WORDPRESS_DB_PASSWORD: change_me
    volumes:
      - wordpress_data:/var/www/html

  db:
    image: mysql:8.0
    container_name: ryohei_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ryohei_wordpress
      MYSQL_USER: ryohei_wpuser
      MYSQL_PASSWORD: change_me
      MYSQL_ROOT_PASSWORD: change_root_password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  wordpress_data:
  db_data:
